name: Trigger Daily
on:
  schedule:
    - cron: '50 6 * * *'
jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger XRP workflow
        run: |
          curl -X POST \
          -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ secrets.GH_REPO }}/actions/workflows/daily.yml/dispatches \
          -d '{"ref":"main"}'
